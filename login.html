<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>InviteMe | Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #faf7ff, #f3ecff);
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* BACKGROUND SHAPES */
    .bg-shape-top {
      position: absolute;
      width: 520px;
      height: 520px;
      background: #c4b5fd;
      opacity: 0.22;
      border-radius: 50%;
      top: -220px;
      right: -120px;
      z-index: 0;
    }

    .bg-shape-bottom {
      position: absolute;
      width: 420px;
      height: 420px;
      background: #8b5cf6;
      opacity: 0.15;
      border-radius: 50%;
      bottom: -180px;
      left: -120px;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .container {
      width: 100%;
      max-width: 1240px;
      min-height: calc(100vh - 60px);

      background: white;

      border-radius: 32px;

      padding: 40px 52px;

      display: grid;
      grid-template-columns: 1.05fr 0.95fr;

      gap: 36px;

      border: 1px solid #eee8ff;

      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);

      overflow: hidden;
    }

    /* LEFT SIDE */
    .left-side {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-right: 10px;
    }

    .logo img {
      width: 100px;
      object-fit: contain;
    }

    .hero-image {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;

      margin-top: -30px;
    }

    .hero-image img {
      width: 80%;
      max-width: 620px;
      height: auto;
      object-fit: contain;
    }

    /* RIGHT SIDE */
    .form-section {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-card {
      width: 100%;
      max-width: 410px;

      background: #fff;

      border: 1px solid #ece7ff;

      border-radius: 26px;

      padding: 34px;

      box-shadow: 0 10px 30px rgba(89, 28, 244, 0.06);
    }

    .form-card h2 {
      font-size: 38px;
      color: #591cf4;
      margin-bottom: 10px;
    }

    .form-card p {
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.6;
      font-size: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      margin-bottom: 10px;
      color: #374151;
      font-size: 15px;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 15px 16px;

      border-radius: 14px;

      border: 1px solid #d6d3e6;

      background: #fcfcff;

      font-size: 15px;

      outline: none;

      transition: 0.3s ease;
    }

    .input-group input:focus {
      border-color: #591cf4;
      box-shadow: 0 0 0 4px rgba(89, 28, 244, 0.12);
    }

    .forgot-password {
      text-align: right;
      margin-top: -8px;
    }

    .forgot-password a {
      color: #591cf4;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .submit-btn {
      width: 100%;

      border: none;

      background: linear-gradient(to right, #591cf4, #7c3aed);

      color: white;

      padding: 16px;

      border-radius: 16px;

      font-size: 15px;
      font-weight: 600;

      cursor: pointer;

      transition: 0.3s ease;

      margin-top: 4px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(89, 28, 244, 0.2);
    }

    .signup-text {
      text-align: center;
      margin-top: 22px;
      color: #6b7280;
      font-size: 14px;
    }

    .signup-text a {
      color: #591cf4;
      text-decoration: none;
      font-weight: 600;
    }

    /* TABLET */
    @media (max-width: 992px) {

      .container {
        grid-template-columns: 1fr;
        padding: 34px 24px;
      }

      .left-side {
        padding-right: 0;
      }

      .hero-image {
        margin-top: 20px;
      }

      .hero-image img {
        max-width: 400px;
      }

      .form-card {
        max-width: 100%;
      }
    }

    /* MOBILE */
    @media (max-width: 640px) {

      .container {
        border-radius: 24px;
        padding: 26px 18px;
      }

      .logo img {
        width: 160px;
      }

      .hero-image img {
        max-width: 300px;
      }

      .form-card {
        padding: 24px 20px;
        border-radius: 22px;
      }

      .form-card h2 {
        font-size: 30px;
      }

      .bg-shape-top,
      .bg-shape-bottom {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- BACKGROUND SHAPES -->
  <div class="bg-shape-top"></div>
  <div class="bg-shape-bottom"></div>

  <div class="page-wrapper">

    <div class="container">

      <!-- LEFT SIDE -->
      <div class="left-side">

        <!-- LOGO -->
        <div class="logo">
          <img src="assets/images/InviteMe.png" alt="InviteMe Logo">
        </div>

        <!-- HERO IMAGE -->
        <div class="hero-image">

          <img
            src="assets/images/bento-card-image.png"
            alt="InviteMe Hero Image">

        </div>

      </div>

      <!-- RIGHT SIDE -->
      <div class="form-section">

        <div class="form-card">

          <h2>Hello!</h2>
 
          <p>
            Welcome back to InviteMe.
          </p>

          <form action="index.html" target="_blank">

            <!-- EMAIL -->
            <div class="input-group">

              <label>
                Email Address
              </label>

              <input
                type="email"
                placeholder="stephen@email.com"
                required>

            </div>

            <!-- PASSWORD -->
            <div class="input-group">

              <label>
                Password
              </label>

              <input
                type="password"
                placeholder="••••••••"
                required>

            </div>

            <!-- FORGOT PASSWORD -->
            <div class="forgot-password">

              <a href="#">
                Forgot Password?
              </a>

            </div>

            <!-- BUTTON -->
            <button
              type="submit"
              class="submit-btn">

              Login

            </button>

          </form>

          <div class="signup-text">

            Don’t have an account?

            <a href="signup.html">
              Create Account
            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

</body>

</html>
