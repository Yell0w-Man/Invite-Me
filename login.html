<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>InviteMe | Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #fdf8ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background-color: white;
      border-radius: 32px;
      padding: 40px;
      border: 1px solid #e6deff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .heading {
      margin-bottom: 40px;
    }

    .heading h1 {
      font-size: 39px;
      color: #4100c3;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .heading p {
      color: #6b7280;
      font-size: 16px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      color: #374151;
    }

    .input-group input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #591cf4;
      box-shadow: 0 0 0 4px rgba(89, 28, 244, 0.12);
    }

    button {
      width: 100%;
      background-color: #591cf4;
      color: white;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #4100c3;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="heading">

      <h1>
        Hello Stephen
      </h1>

      <p>
        Welcome back
      </p>

    </div>

    <form target="_blank" action="index.html">

      <!-- Name -->
      <div class="input-group">

        <label>
          Name
        </label>

        <input
          type="text"
          required
          placeholder="Stephen">

      </div>

      <!-- Email -->
      <div class="input-group">

        <label>
          Email Address
        </label>

        <input
          type="email"
          required
          placeholder="stephen@email.com">

      </div>

      <!-- Button -->
      <button type="submit">

        Login

      </button>

    </form>

  </div>

</body>

</html>
