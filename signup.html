<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>InviteMe | Sign Up</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: "Hanken Grotesk", sans-serif;  
    }
  </style>
</head>

<body class="bg-[#fdf8ff] min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-md bg-white rounded-[32px] p-10 shadow-xl border border-[#e6deff]">

    <div class="text-center mb-8">

      <h1 class="text-4xl font-bold text-[#4100c3]">
        Create Account
      </h1>

      <p class="text-gray-500 mt-3">
        Start creating sending invitations
      </p>

    </div>

    <form target="_blank" action="index.html" class="space-y-6">

    
      <div>

        <label class="block mb-2 font-medium text-gray-700">
          Full Name
        </label>

        <input
          type="text"
          required
          placeholder="Bami Ewetuga"
          class="w-full rounded-xl border border-gray-200 px-4 py-4 focus:outline-none focus:border-[#591cf4]">

      </div>

      <!-- Email -->
      <div>

        <label class="block mb-2 font-medium text-gray-700">
          Email Address
        </label>

        <input
          type="email"
          required
          placeholder="stephen@email.com"
          class="w-full rounded-xl border border-gray-200 px-4 py-4 focus:outline-none focus:border-[#591cf4]">

      </div>

      <!-- Password -->
      <div>

        <label class="block mb-2 font-medium text-gray-700">
          Password
        </label>

        <input
          type="password"
          required
          minlength="8"
          pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).+$"
          placeholder="••••••••"
          class="w-full rounded-xl border border-gray-200 px-4 py-4 focus:outline-none focus:border-[#591cf4]">

        <p class="text-sm text-gray-500 mt-2">
          Must contain letters, numbers, symbols and at least 8 characters.
        </p>

      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-[#591cf4] hover:bg-[#4100c3] text-white py-4 rounded-xl font-semibold transition">

        Create Account

      </button>

    </form>

  </div>

</body>

</html>
